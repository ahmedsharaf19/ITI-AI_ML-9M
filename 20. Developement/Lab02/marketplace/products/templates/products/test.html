<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Products Marketplace</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        body {
            font-family: Arial, sans-serif;
            background-color: #f5f5f5;
        }
        header {
            background-color: #333;
            color: white;
            padding: 20px;
            text-align: center;
        }
        .container {
            max-width: 1200px;
            margin: 20px auto;
            padding: 20px;
        }
        .products-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(300px, 1fr));
            gap: 20px;
        }
        .product-card {
            background: white;
            border-radius: 8px;
            box-shadow: 0 2px 8px rgba(0,0,0,0.1);
            overflow: hidden;
            transition: transform 0.3s;
        }
        .product-card:hover {
            transform: translateY(-5px);
        }
        .product-image {
            width: 100%;
            height: 200px;
            background-color: #ddd;
            display: flex;
            align-items: center;
            justify-content: center;
        }
        .product-info {
            padding: 15px;
        }
        .product-name {
            font-size: 18px;
            font-weight: bold;
            margin-bottom: 10px;
        }
        .product-price {
            color: #e74c3c;
            font-size: 20px;
            font-weight: bold;
        }
        button {
            background-color: #3498db;
            color: white;
            border: none;
            padding: 10px 20px;
            margin-top: 10px;
            border-radius: 4px;
            cursor: pointer;
        }
        button:hover {
            background-color: #2980b9;
        }
    </style>
</head>
<body>
    {% load static  "products/images"%}
    <img src='{% static "mac_boc.jpeg" %}' width='100' height='100'> 
    <header>
        <h1>Marketplace</h1>
    </header>
    <div class="container">
        <div class="products-grid">
            <div class="product-card">
                <div class="product-image">Product Image</div>
                <div class="product-info">
                    <div class="product-name">Product 1</div>
                    <div class="product-price">$29.99</div>
                    <button>Add to Cart</button>
                </div>
            </div>
            <div class="product-card">
                <div class="product-image">Product Image</div>
                <div class="product-info">
                    <div class="product-name">Product 2</div>
                    <div class="product-price">$39.99</div>
                    <button>Add to Cart</button>
                </div>
            </div>
            <div class="product-card">
                <div class="product-image">Product Image</div>
                <div class="product-info">
                    <div class="product-name">Product 3</div>
                    <div class="product-price">$49.99</div>
                    <button>Add to Cart</button>
                </div>
            </div>
        </div>
    </div>
</body>
</html>
